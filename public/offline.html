<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <title>ThaiGroup offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 28%),
          linear-gradient(180deg, #0f172a 0%, #08101c 56%, #020617 100%);
        color: #f8fafc;
        font-family: "Segoe UI", sans-serif;
      }
      article {
        width: min(92vw, 480px);
        padding: 2rem;
        border-radius: 28px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(8, 14, 28, 0.82);
        backdrop-filter: blur(18px);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.6;
        color: #cbd5e1;
      }
      a {
        color: #4ade80;
      }
    </style>
  </head>
  <body>
    <article>
      <p style="letter-spacing: 0.24em; text-transform: uppercase; color: #86efac">
        ThaiGroup
      </p>
      <h1>Sin conexión</h1>
      <p>
        Si ya abriste la app antes, vuelve a <a href="/">la pantalla principal</a>.
        La PWA intentará cargar la shell en caché y tu último estado local.
      </p>
      <p>
        Si esta es tu primera visita sin red, necesitarás abrir la app al menos
        una vez online para que quede instalada y cacheada.
      </p>
    </article>
  </body>
</html>
